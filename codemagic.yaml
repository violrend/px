workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Show Xcode version
        script: |
          xcodebuild -version

      - name: Build archive
        script: |
          xcodebuild archive \
            -project PriceFoxyApp.xcodeproj \
            -scheme PriceFoxyApp \
            -configuration Release \
            -archivePath build/PriceFoxyApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - build/PriceFoxyApp.xcarchive
